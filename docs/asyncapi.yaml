      title: Send a room chat message
      summary: Sends a text message to a joined room. The server persists it and broadcasts a room_chat_message event.
      payload:
        type: object
        required:
          - type
          - data
        properties:
          type:
            type: string
            enum:
              - chat
          nonce:
            type: string
            description: Optional client-generated request nonce echoed by the direct server reply.
          data:
            $ref: '#/components/schemas/ChatSendData'
