      examples:
        - name: chat
          payload:
            type: chat
            nonce: 41e9a6a0f4b84683
            data:
              server_id: 8c2fd426-b799-4d4d-976d-18a35bf1b57f
              room_id: 7ba6fb0c-1e59-486a-bb31-fd73ddd6cbec
