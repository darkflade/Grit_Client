    SubscribeServer:
      name: SubscribeServer
      title: Subscribe to a server
      summary: Subscribe the current WebSocket connection to server-level state.
      payload:
        type: object
        required:
          - type
          - data
        properties:
          type:
            type: string
            enum:
              - subscribe_server
          data:
            $ref: '#/components/schemas/ServerSubscriptionData'
        additionalProperties: false
      examples:
        - name: subscribeServer
          payload:
            type: subscribe_server
            data:
              server_id: 8c2fd426-b799-4d4d-976d-18a35bf1b57f
    UnsubscribeServer:
      name: UnsubscribeServer
