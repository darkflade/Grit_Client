asyncapi: 2.6.0
id: urn:vimh:event-transport-api
info:
  title: VIMH Event Transport API
  version: 1.6.0
  contact:
    name: VIMH API maintainers
  description: |
    AsyncAPI specification for the authenticated VIMH WebSocket and WebTransport endpoints.

    Connection:
    - WebSocket endpoint: `GET /ws/global/register`
    - WebTransport endpoint: `CONNECT /webtransport/global/register/{token}` on `api.diogen.space:7092`.
      It runs over HTTP/3/QUIC and uses the same message contracts as WebSocket.
    - WebSocket authentication is performed by the same HTTP-only `access_token` cookie used by the REST API.
    - WebTransport authentication uses a one-time REST-issued registration token from
      `POST /api/auth/webtransport-token`. The token is bound to the authenticated user,
      expires after 30 seconds and is deleted when consumed.
    - Client commands are JSON text frames in the envelope `{ "type": "...", "nonce": "...", "data": { ... } }`.
      `nonce` is optional and generated by the client; direct server replies echo the same `nonce`.
    - WebTransport framing uses exactly one long-lived bidirectional stream per session.
      Each application message is sent as binary length-prefixed framing:
      `[4 bytes big-endian payload length][UTF-8 JSON payload]`.
      The JSON payload itself uses the same envelope as WebSocket.
    - Server events use the same `{ "type": "...", "data": { ... } }` envelope. Broadcast events do not include
      a request `nonce`.
    - Heartbeat timeout is 25 seconds. WebSocket uses protocol ping control frames every 20 seconds;
      clients must answer with WebSocket pong control frames.
    - WebTransport heartbeat uses QUIC datagrams, not the length-prefixed JSON stream.
      The server sends `{"type":"ping","ts":<unix_ms>}` datagrams every 20 seconds and closes
      the session if no `pong` datagram is received within 25 seconds. Clients must answer each
      ping datagram with `{"type":"pong","ts":<same_ts>}`. These heartbeat datagrams are transport
      control messages and are not delivered through the application event envelope.
    - Incoming client messages are rate limited to 60 messages per minute per connection.
    - WebRTC SFU uses Unified Plan SDP. Clients should implement the polite side of perfect negotiation:
      rollback a local offer if a server `sfu_offer` arrives while the client is making an offer or is not stable.
    - SFU ICE uses Trickle ICE. End-of-candidates is represented by `data: null` in `sfu_ice_candidate`.
      ICE restart is requested with `sfu_ice_restart`; the restart itself is delivered as a normal server `sfu_offer`.
    - Direct-call SFU flow is room-scoped by direct-room UUID:
      `POST /api/direct/rooms/{room_id}/calls` creates the call session and broadcasts `direct_call_started`,
      then both peers send `sfu_join` with the same direct-room UUID. The `sfu_joined` ack returns
      `scope: direct` and intentionally does not include `session_id`. After `sfu_joined`, the client sends
      the initial `sfu_offer`, completes trickle ICE, and treats `direct_call_ended` as the canonical
      call-termination event for that direct room.
defaultContentType: application/json
tags:
  - name: connection
    description: WebSocket/WebTransport connection, authentication and lifecycle.
  - name: servers
    description: Server subscriptions and room membership commands.
  - name: rooms
    description: Room chat and message lifecycle events.
  - name: direct
    description: Direct messages and direct calls.
  - name: sfu
    description: WebRTC SFU signaling.
  - name: presence
    description: User presence notifications.
servers:
  production:
    url: api.diogen.space
    protocol: wss
    description: Production WebSocket endpoint.
  productionWebTransport:
    url: api.diogen.space:7092
    protocol: https
    protocolVersion: HTTP/3
    description: Production WebTransport endpoint over HTTP/3/QUIC using one REST-issued registration token and one bidirectional stream with 4-byte big-endian length-prefixed JSON messages.
#  local:
#    url: 127.0.0.1:{port}
#    protocol: ws
#    description: Local development endpoint.
#    variables:
#      port:
#        default: "8080"
#        description: Value of `APP_PORT`.
#    security:
#      - accessTokenCookie: []
channels:
  /ws/global/register:
    description: |
      Main authenticated WebSocket channel for subscriptions, room chat, direct messages,
      presence updates and SFU signaling.
    servers:
      - production
    bindings:
      ws:
        method: GET
    subscribe: &receiveServerEventOperation
      operationId: receiveServerEvent
      summary: Messages pushed from the server to the client
      description: |
        Events delivered to the connected user. Some events are sent only after the user joins a room,
        subscribes to a server, belongs to a direct room, or is a friend of the user whose presence changed.
      tags:
        - name: connection
        - name: servers
        - name: rooms
        - name: direct
        - name: sfu
        - name: presence
      message:
        oneOf:
          - $ref: '#/components/messages/SubscribedServerAck'
          - $ref: '#/components/messages/UnsubscribedServerAck'
          - $ref: '#/components/messages/ServerParticipants'
          - $ref: '#/components/messages/ServerRoomsSnapshot'
          - $ref: '#/components/messages/ServerUpdated'
          - $ref: '#/components/messages/ServerMemberRemoved'
          - $ref: '#/components/messages/ServerRoleUpdated'
          - $ref: '#/components/messages/JoinedRoomAck'
          - $ref: '#/components/messages/LeftRoomAck'
          - $ref: '#/components/messages/RTCRoomParticipants'
          - $ref: '#/components/messages/RoomCreated'
          - $ref: '#/components/messages/RoomUpdated'
          - $ref: '#/components/messages/RoomDeleted'
          - $ref: '#/components/messages/RoomChatMessage'
          - $ref: '#/components/messages/TypingIndicator'
          - $ref: '#/components/messages/MessageUpdated'
          - $ref: '#/components/messages/MessageDeleted'
          - $ref: '#/components/messages/MessageStatusUpdated'
          - $ref: '#/components/messages/MessagePinUpdated'
          - $ref: '#/components/messages/MessageReactionUpdated'
          - $ref: '#/components/messages/RoomMessagesSnapshot'
          - $ref: '#/components/messages/DirectRoomCreated'
          - $ref: '#/components/messages/DirectRoomUpdated'
          - $ref: '#/components/messages/DirectRoomLeft'
          - $ref: '#/components/messages/DirectMessagesSnapshot'
          - $ref: '#/components/messages/DirectMessageCreated'
          - $ref: '#/components/messages/DirectMessageUpdated'
          - $ref: '#/components/messages/DirectMessageDeleted'
          - $ref: '#/components/messages/DirectMessageStatusUpdated'
          - $ref: '#/components/messages/DirectCallStarted'
          - $ref: '#/components/messages/DirectCallEnded'
          - $ref: '#/components/messages/DirectCallDeclined'
          - $ref: '#/components/messages/FriendRequestsSnapshot'
          - $ref: '#/components/messages/FriendRequestReceived'
          - $ref: '#/components/messages/FriendRequestAccepted'
          - $ref: '#/components/messages/FriendRequestRejected'
          - $ref: '#/components/messages/FriendRemoved'
          - $ref: '#/components/messages/UserPresenceUpdated'
          - $ref: '#/components/messages/SFUJoinedAck'
          - $ref: '#/components/messages/SFULeftAck'
          - $ref: '#/components/messages/SFUOfferFromServer'
          - $ref: '#/components/messages/SFUAnswerFromServer'
          - $ref: '#/components/messages/SFUIceCandidateFromServer'
          - $ref: '#/components/messages/SFUParticipantMuted'
          - $ref: '#/components/messages/SFUParticipantUnmuted'
          - $ref: '#/components/messages/SFUActiveSpeakers'
          - $ref: '#/components/messages/SFUMediaState'
          - $ref: '#/components/messages/Error'
    publish: &sendClientCommandOperation
      operationId: sendClientCommand
      summary: Messages accepted by the server from the client
      description: |
        Commands sent by the client. The WebSocket route must be opened with a valid `access_token`
        cookie before any command is accepted.
      tags:
        - name: servers
        - name: rooms
        - name: direct
        - name: sfu
      message:
        oneOf:
          - $ref: '#/components/messages/SubscribeServer'
          - $ref: '#/components/messages/UnsubscribeServer'
          - $ref: '#/components/messages/GetServerParticipants'
          - $ref: '#/components/messages/GetServerRooms'
          - $ref: '#/components/messages/GetRoomMessages'
          - $ref: '#/components/messages/JoinRoom'
          - $ref: '#/components/messages/LeaveRoom'
          - $ref: '#/components/messages/GetRTCRoomParticipants'
          - $ref: '#/components/messages/Chat'
          - $ref: '#/components/messages/EditMessage'
          - $ref: '#/components/messages/DeleteMessage'
          - $ref: '#/components/messages/MarkMessageRead'
          - $ref: '#/components/messages/PinMessage'
          - $ref: '#/components/messages/UnpinMessage'
          - $ref: '#/components/messages/TypingIndicatorCommand'
          - $ref: '#/components/messages/GetDirectMessages'
          - $ref: '#/components/messages/GetFriendRequests'
          - $ref: '#/components/messages/DirectRoomCreate'
          - $ref: '#/components/messages/DirectMessage'
          - $ref: '#/components/messages/DirectMessageEdit'
          - $ref: '#/components/messages/DirectMessageDelete'
          - $ref: '#/components/messages/DirectMessageRead'
          - $ref: '#/components/messages/DirectCallStart'
          - $ref: '#/components/messages/DirectCallEnd'
          - $ref: '#/components/messages/DirectCallDecline'
          - $ref: '#/components/messages/SFUJoin'
          - $ref: '#/components/messages/SFULeave'
          - $ref: '#/components/messages/SFUOfferToServer'
          - $ref: '#/components/messages/SFUAnswerToServer'
          - $ref: '#/components/messages/SFUIceCandidateToServer'
          - $ref: '#/components/messages/SFUIceRestartToServer'
          - $ref: '#/components/messages/SFUParticipantMutedToServer'
          - $ref: '#/components/messages/SFUParticipantUnmutedToServer'
          - $ref: '#/components/messages/SFUActiveSpeakersToServer'
          - $ref: '#/components/messages/SFUMediaStateToServer'
  /webtransport/global/register/{token}:
    description: |
      Main authenticated WebTransport session for subscriptions, room chat, direct messages,
      presence updates and SFU signaling.

      Before connecting, the client must call `POST /api/auth/webtransport-token` with
      the normal REST `access_token` cookie. Use the returned one-time `token` in this
      path. The token expires after 30 seconds and is removed after a successful
      WebTransport registration.

      After the HTTP/3 CONNECT upgrade succeeds, the client must open exactly one bidirectional
      WebTransport stream and keep it open for the whole session.

      Framing on that stream is binary and length-prefixed:
      - `4 bytes` unsigned big-endian payload length
      - `N bytes` UTF-8 JSON payload

      The payload JSON is the same envelope documented for the WebSocket channel.

      WebTransport heartbeat is carried out-of-band over QUIC datagrams. The server sends
      `HeartbeatPingDatagram`; clients must answer with `HeartbeatPongDatagram` using the same
      `ts` value. The heartbeat timeout is 25 seconds.
    servers:
      - productionWebTransport
    publish:
      operationId: sendClientCommandOverWebTransport
      summary: Messages accepted by the server from the client
      description: |
        Commands sent by the client over the authenticated WebTransport session.
        The JSON envelope and command set are identical to the WebSocket transport.
      tags:
        - name: servers
        - name: rooms
        - name: direct
        - name: sfu
      message:
        oneOf:
          - $ref: '#/components/messages/SubscribeServer'
          - $ref: '#/components/messages/UnsubscribeServer'
          - $ref: '#/components/messages/GetServerParticipants'
          - $ref: '#/components/messages/GetServerRooms'
          - $ref: '#/components/messages/GetRoomMessages'
          - $ref: '#/components/messages/JoinRoom'
          - $ref: '#/components/messages/LeaveRoom'
          - $ref: '#/components/messages/GetRTCRoomParticipants'
          - $ref: '#/components/messages/Chat'
          - $ref: '#/components/messages/EditMessage'
          - $ref: '#/components/messages/DeleteMessage'
          - $ref: '#/components/messages/MarkMessageRead'
          - $ref: '#/components/messages/PinMessage'
          - $ref: '#/components/messages/UnpinMessage'
          - $ref: '#/components/messages/TypingIndicatorCommand'
          - $ref: '#/components/messages/GetDirectMessages'
          - $ref: '#/components/messages/GetFriendRequests'
          - $ref: '#/components/messages/DirectRoomCreate'
          - $ref: '#/components/messages/DirectMessage'
          - $ref: '#/components/messages/DirectMessageEdit'
          - $ref: '#/components/messages/DirectMessageDelete'
          - $ref: '#/components/messages/DirectMessageRead'
          - $ref: '#/components/messages/DirectCallStart'
          - $ref: '#/components/messages/DirectCallEnd'
          - $ref: '#/components/messages/DirectCallDecline'
          - $ref: '#/components/messages/SFUJoin'
          - $ref: '#/components/messages/SFULeave'
          - $ref: '#/components/messages/SFUOfferToServer'
          - $ref: '#/components/messages/SFUAnswerToServer'
          - $ref: '#/components/messages/SFUIceCandidateToServer'
          - $ref: '#/components/messages/SFUIceRestartToServer'
          - $ref: '#/components/messages/SFUParticipantMutedToServer'
          - $ref: '#/components/messages/SFUParticipantUnmutedToServer'
          - $ref: '#/components/messages/SFUActiveSpeakersToServer'
          - $ref: '#/components/messages/SFUMediaStateToServer'
    subscribe:
      operationId: receiveServerEventOverWebTransport
      summary: Messages pushed from the server to the client
      description: |
        Events delivered over the authenticated WebTransport session.
        The event envelope and payloads are identical to the WebSocket transport.
      tags:
        - name: connection
        - name: servers
        - name: rooms
        - name: direct
        - name: sfu
        - name: presence
      message:
        oneOf:
          - $ref: '#/components/messages/SubscribedServerAck'
          - $ref: '#/components/messages/UnsubscribedServerAck'
          - $ref: '#/components/messages/ServerParticipants'
          - $ref: '#/components/messages/ServerRoomsSnapshot'
          - $ref: '#/components/messages/ServerUpdated'
          - $ref: '#/components/messages/ServerMemberRemoved'
          - $ref: '#/components/messages/ServerRoleUpdated'
          - $ref: '#/components/messages/JoinedRoomAck'
          - $ref: '#/components/messages/LeftRoomAck'
          - $ref: '#/components/messages/RTCRoomParticipants'
          - $ref: '#/components/messages/RoomCreated'
          - $ref: '#/components/messages/RoomUpdated'
          - $ref: '#/components/messages/RoomDeleted'
          - $ref: '#/components/messages/RoomChatMessage'
          - $ref: '#/components/messages/TypingIndicator'
          - $ref: '#/components/messages/MessageUpdated'
          - $ref: '#/components/messages/MessageDeleted'
          - $ref: '#/components/messages/MessageStatusUpdated'
          - $ref: '#/components/messages/MessagePinUpdated'
          - $ref: '#/components/messages/MessageReactionUpdated'
          - $ref: '#/components/messages/RoomMessagesSnapshot'
          - $ref: '#/components/messages/DirectRoomCreated'
          - $ref: '#/components/messages/DirectRoomUpdated'
          - $ref: '#/components/messages/DirectRoomLeft'
          - $ref: '#/components/messages/DirectMessagesSnapshot'
          - $ref: '#/components/messages/DirectMessageCreated'
          - $ref: '#/components/messages/DirectMessageUpdated'
          - $ref: '#/components/messages/DirectMessageDeleted'
          - $ref: '#/components/messages/DirectMessageStatusUpdated'
          - $ref: '#/components/messages/DirectCallStarted'
          - $ref: '#/components/messages/DirectCallEnded'
          - $ref: '#/components/messages/DirectCallDeclined'
          - $ref: '#/components/messages/FriendRequestsSnapshot'
          - $ref: '#/components/messages/FriendRequestReceived'
          - $ref: '#/components/messages/FriendRequestAccepted'
          - $ref: '#/components/messages/FriendRequestRejected'
          - $ref: '#/components/messages/FriendRemoved'
          - $ref: '#/components/messages/UserPresenceUpdated'
          - $ref: '#/components/messages/SFUJoinedAck'
          - $ref: '#/components/messages/SFULeftAck'
          - $ref: '#/components/messages/SFUOfferFromServer'
          - $ref: '#/components/messages/SFUAnswerFromServer'
          - $ref: '#/components/messages/SFUIceCandidateFromServer'
          - $ref: '#/components/messages/SFUParticipantMuted'
          - $ref: '#/components/messages/SFUParticipantUnmuted'
          - $ref: '#/components/messages/SFUActiveSpeakers'
          - $ref: '#/components/messages/SFUMediaState'
          - $ref: '#/components/messages/Error'
components:
  schemas:
    UUID:
      type: string
      format: uuid
      example: 8c2fd426-b799-4d4d-976d-18a35bf1b57f
    DateTime:
      type: string
      format: date-time
      example: "2026-05-16T12:00:00Z"
    ServerSubscriptionData:
      type: object
      required:
        - server_id
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
      additionalProperties: false
    PublicUser:
      type: object
      required:
        - id
        - nickname
        - status
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        nickname:
          type: string
          example: grimcoder
        avatar_url:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        custom_status:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - online
            - offline
            - idle
            - dnd
        last_seen_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
        created_at:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false
    ServerMember:
      type: object
      required:
        - server_id
        - user_id
        - can_manage_server
        - can_manage_rooms
        - can_invite
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        user_id:
          $ref: '#/components/schemas/UUID'
        role:
          type: string
          nullable: true
          example: member
        role_id:
          $ref: '#/components/schemas/UUID'
        can_manage_server:
          type: boolean
        can_manage_rooms:
          type: boolean
        can_invite:
          type: boolean
        joined_at:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false
    Server:
      type: object
      required:
        - id
        - owner_id
        - name
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        owner_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        icon_url:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false
    ServerRole:
      type: object
      required:
        - id
        - server_id
        - name
        - position
        - can_manage_server
        - can_manage_rooms
        - can_invite
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        server_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        color:
          type: string
          nullable: true
        position:
          type: string
        can_manage_server:
          type: boolean
        can_manage_rooms:
          type: boolean
        can_invite:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false
    Room:
      type: object
      required:
        - id
        - server_id
        - name
        - type
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        server_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        type:
          type: string
          enum:
            - chat
            - rtc
        position:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false
    DeletedRoomData:
      type: object
      required:
        - id
        - server_id
        - deleted
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        server_id:
          $ref: '#/components/schemas/UUID'
        deleted:
          type: boolean
      additionalProperties: false
    ServerMemberRemovedData:
      type: object
      required:
        - server_id
        - user_id
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        user_id:
          $ref: '#/components/schemas/UUID'
      additionalProperties: false
    ServerRoleUpdatedData:
      type: object
      required:
        - server_id
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        role:
          $ref: '#/components/schemas/ServerRole'
        role_id:
          $ref: '#/components/schemas/UUID'
        created:
          type: boolean
        deleted:
          type: boolean
      additionalProperties: false
    FriendRequestEventData:
      type: object
      required:
        - initiator_id
        - friend_id
        - initiator
        - friend
      properties:
        initiator_id:
          $ref: '#/components/schemas/UUID'
        friend_id:
          $ref: '#/components/schemas/UUID'
        initiator:
          $ref: '#/components/schemas/PublicUser'
        friend:
          $ref: '#/components/schemas/PublicUser'
        direct_room:
          $ref: '#/components/schemas/DirectRoom'
      additionalProperties: false
    FriendRelationEventData:
      type: object
      required:
        - user_id
        - friend_id
        - user
        - friend
      properties:
        user_id:
          $ref: '#/components/schemas/UUID'
        friend_id:
          $ref: '#/components/schemas/UUID'
        user:
          $ref: '#/components/schemas/PublicUser'
        friend:
          $ref: '#/components/schemas/PublicUser'
      additionalProperties: false
    FriendRequest:
      type: object
      required:
        - initiator_id
        - friend_id
        - initiator
        - friend
        - created_at
        - updated_at
      properties:
        initiator_id:
          $ref: '#/components/schemas/UUID'
        friend_id:
          $ref: '#/components/schemas/UUID'
        initiator:
          $ref: '#/components/schemas/PublicUser'
        friend:
          $ref: '#/components/schemas/PublicUser'
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false
    ServerParticipant:
      type: object
      required:
        - user
        - member
        - online
        - subscribed
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        member:
          $ref: '#/components/schemas/ServerMember'
        online:
          type: boolean
          description: True when the user currently has an active global WebSocket connection.
        subscribed:
          type: boolean
          description: True when the user subscribed this WebSocket connection to the server.
      additionalProperties: false
    ServerParticipantsData:
      type: object
      required:
        - server_id
        - total
        - online_count
        - participants
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        total:
          type: integer
          minimum: 0
        online_count:
          type: integer
          minimum: 0
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ServerParticipant'
      additionalProperties: false
    ServerRoomsSnapshotData:
      type: object
      required:
        - server_id
        - rooms
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/Room'
      additionalProperties: false
    RTCRoomParticipant:
      type: object
      required:
        - user
        - user_id
        - joined_at
        - connection_state
        - track_ids
        - track_count
        - online
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        user_id:
          $ref: '#/components/schemas/UUID'
        joined_at:
          $ref: '#/components/schemas/DateTime'
        connection_state:
          type: string
          example: connected
        track_ids:
          type: array
          items:
            type: string
        track_count:
          type: integer
          minimum: 0
        online:
          type: boolean
      additionalProperties: false
    RTCRoomParticipantsData:
      type: object
      required:
        - server_id
        - room_id
        - total
        - participants
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        room_id:
          $ref: '#/components/schemas/UUID'
        total:
          type: integer
          minimum: 0
        participants:
          type: array
          items:
            $ref: '#/components/schemas/RTCRoomParticipant'
      additionalProperties: false
    RoomJoinData:
      type: object
      required:
        - server_id
        - room_id
      properties:
        server_id:
          $ref: '#/components/schemas/UUID'
        room_id:
          $ref: '#/components/schemas/UUID'
      additionalProperties: false
    RoomLeaveData:
      type: object
      required:
        - room_id
      properties:
        room_id:
          $ref: '#/components/schemas/UUID'
        scope:
          type: string
          enum:
            - server
            - direct
          description: Present on SFU leave acknowledgements.
        reason:
          type: string
          description: Optional server-supplied leave reason.
      additionalProperties: false
    HeartbeatPingDatagram:
      type: object
      description: WebTransport QUIC datagram sent by the server every 20 seconds.
      required:
        - type
        - ts
      properties:
        type:
          type: string
          enum:
            - ping
        ts:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds generated by the sender.
      additionalProperties: false
    HeartbeatPongDatagram:
      type: object
